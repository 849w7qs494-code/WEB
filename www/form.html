<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация студента</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
            background: #fafafa;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 30px;
            padding: 10px 0;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-option input[type="radio"] {
            width: auto;
            margin: 0;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .required::after {
            content: " *";
            color: #f44336;
        }

        small {
            display: block;
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Регистрация студента</h1>
        
        <form action="process.php" method="POST">
            <!-- ФИО -->
            <div class="form-group">
                <label class="required">ФИО студента</label>
                <input type="text" name="fullname" placeholder="Иванов Иван Иванович" required>
            </div>
            
            <!-- Возраст -->
            <div class="form-group">
                <label class="required">Возраст</label>
                <input type="number" name="age" min="16" max="35" placeholder="16" required>
                <small>от 16 до 35 лет</small>
            </div>
            
            <!-- Страна (будет заполнена через JS) -->
            <div class="form-group">
                <label class="required">Страна (API hh.ru)</label>
                <select name="country" id="countrySelect" required>
                    <option value=""> Загрузка списка стран...</option>
                </select>
                <small>Данные с https://api.hh.ru/areas</small>
            </div>
            
            <!-- Факультет -->
            <div class="form-group">
                <label class="required">Факультет</label>
                <select name="faculty" required>
                    <option value="">-- Выберите факультет --</option>
                    <option value="Информационные технологии">Информационные технологии</option>
                    <option value="Инженерный">Инженерный</option>
                    <option value="Экономический">Экономический</option>
                    <option value="Медицинский">Медицинский</option>
                    <option value="Юридический">Юридический</option>
                </select>
            </div>
            
            <!-- Форма обучения -->
            <div class="form-group">
                <label class="required">Форма обучения</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="education" value="Очная" required>
                        <span>Очная</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="education" value="Заочная">
                        <span>Заочная</span>
                    </label>
                </div>
            </div>
            
            <!-- Email -->
            <div class="form-group">
                <label class="required">Email</label>
                <input type="email" name="email" placeholder="student@example.com" required>
            </div>
            
            <!-- Чекбокс -->
            <div class="checkbox-group">
                <input type="checkbox" name="agree" id="agree" required>
                <label for="agree">Я согласен с правилами обработки данных</label>
            </div>
            
            <!-- Кнопка -->
            <button type="submit">Отправить</button>
        </form>
    </div>

    <script>
        // Загрузка стран из API
        fetch('get_countries.php')
            .then(response => response.json())
            .then(data => {
                const select = document.getElementById('countrySelect');
                select.innerHTML = '<option value="">-- Выберите страну --</option>';
                
                // API hh.ru возвращает массив стран
                data.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country.id;
                    option.textContent = country.name;
                    select.appendChild(option);
                });
            })
            .catch(error => {
                document.getElementById('countrySelect').innerHTML = '<option value=""> Ошибка загрузки</option>';
            });

        // Alert перед отправкой
        document.querySelector('form').addEventListener('submit', function(e) {
            const fullname = this.fullname.value;
            const age = this.age.value;
            const country = this.country.options[this.country.selectedIndex]?.text;
            const faculty = this.faculty.options[this.faculty.selectedIndex]?.text;
            const education = document.querySelector('input[name="education"]:checked')?.value;
            const email = this.email.value;
            
            alert(` Проверьте данные:\n\n` +
                  `ФИО: ${fullname}\n` +
                  `Возраст: ${age}\n` +
                  `Страна: ${country}\n` +
                  `Факультет: ${faculty}\n` +
                  `Форма: ${education}\n` +
                  `Email: ${email}`);
        });
    </script>
</body>
</html>
