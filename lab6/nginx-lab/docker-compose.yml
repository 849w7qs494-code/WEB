version: '3.8'

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: lab6_nginx
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - lab6_network

  php:
    build: .
    container_name: lab6_php
    volumes:
      - ./www:/var/www/html
      - ./vendor:/var/www/html/vendor 
    expose:
      - "9000"
    depends_on:
      - redis
      - elasticsearch
      - clickhouse
    networks:
      - lab6_network

  redis:
    image: redis:7
    container_name: lab6_redis
    ports:
      - "6379:6379"
    networks:
      - lab6_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: lab6_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - lab6_network

  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: lab6_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - lab6_network

networks:
  lab6_network:
    driver: bridge